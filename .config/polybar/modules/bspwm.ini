[module/bspwm]
type = internal/bspwm

pin-workspaces = true
strip-wsnumbers = true
index-sort = true

inline-mode = true

enable-click = true
enable-scroll = false
reverse-scroll = false

ws-icon-0 = I;
ws-icon-1 = II;
ws-icon-2 = III;
ws-icon-3 = IV;
ws-icon-4 = V;
ws-icon-5 = VI;
ws-icon-6 = VII;
ws-icon-7 = VIII;
ws-icon-8 = IX;
ws-icon-9 = X;
ws-icon-default = 

format = <label-state>

label-dimmed-foreground = ${colors.inactive}

label-focused = 
label-focused-foreground = ${colors.light}
label-focused-background = ${colors.background}
label-focused-padding = 1

label-occupied =   
label-occupied-foreground = ${colors.inactive}
label-occupied-background = ${colors.background}
label-occupied-padding = 1

label-empty = 
label-empty-foreground = ${colors.inactive}
label-empty-background = ${colors.background}
label-empty-padding = 1

label-urgent =  
label-urgent-foreground = ${colors.color1}
label-urgent-background = ${colors.background}
label-urgent-padding = 1

label-mode = %mode%
label-mode-padding = 1
label-mode-foreground = ${colors.color3}
label-mode-background = ${colors.background}
