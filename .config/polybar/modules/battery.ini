
[module/battery]
type = internal/battery
full-at = 99

battery = BAT1
adapter = ACAD

poll-interval = 2

time-format = %H:%M

format-charging = <animation-charging>
format-charging-padding = 0
format-charging-background = ${colors.background}

format-discharging = <ramp-capacity>
format-discharging-padding = 0
format-discharging-background = ${colors.background}

; Available tags:
;   <label-full> (default)
;   <bar-capacity>
;   <ramp-capacity>
format-full = <ramp-capacity>
format-full-foreground = ${colors.color2}
format-full-background = ${colors.background}


label-charging = "%percentage%% (%time%)"
label-discharging = "%percentage%% (%time%)"

ramp-capacity-0 = " " 
ramp-capacity-1 = " " 
ramp-capacity-2 = " " 
ramp-capacity-3 = " " 
ramp-capacity-4 = " " 

ramp-capacity-0-foreground = ${colors.color1}
ramp-capacity-1-foreground = ${colors.color3}
ramp-capacity-2-foreground = ${colors.color2}

animation-charging-0 = " "
animation-charging-1 = " "
animation-charging-2 = " "
animation-charging-3 = " "
animation-charging-4 = " "

animation-charging-0-foreground = ${colors.light}
animation-charging-1-foreground = ${colors.light}
animation-charging-2-foreground = ${colors.light}
animation-charging-3-foreground = ${colors.light}
animation-charging-4-foreground = ${colors.light}


animation-charging-framerate = 750

; vim:ft=dosini

